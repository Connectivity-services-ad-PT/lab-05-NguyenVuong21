services:
  # 1. PostgreSQL Database Service
  db:
    image: postgres:15-alpine
    container_name: fit4110-db-lab05
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-lab05}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-lab05pass}
      POSTGRES_DB: ${POSTGRES_DB:-iotdb}
    volumes:
      - db-data:/var/lib/postgresql/data
    networks:
      - team-internal
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER:-lab05} -d $${POSTGRES_DB:-iotdb}"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # 2. AI Service Mock (Giả lập dự đoán YOLO / ML)
  ai-service:
    image: python:3.11-slim
    container_name: fit4110-ai-lab05
    working_dir: /service
    volumes:
      - ./src/ai_service:/service
    # Ép cài nhanh dependency trực tiếp vào container slim trước khi thực thi file code gốc của trường
    command: >
      sh -c "pip install --no-cache-dir fastapi uvicorn && python main.py"
    networks:
      - team-internal
    ports:
      - "9000:9000"
    restart: unless-stopped

  # 3. Service API FastAPI (Main Ingestion API)
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: fit4110-api-lab05
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
      ai-service:
        condition: service_started  # <-- THAY DÒNG NÀY: Chỉ cần AI bật lên (started) là API chạy, không bắt ép healthy nữa
    networks:
      - team-internal
      - class-net
    ports:
      - "${APP_PORT:-8000}:8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped

networks:
  team-internal:
    driver: bridge
    name: team-internal
  class-net:
    external: true

volumes:
  db-data:
    name: lab05_db_data